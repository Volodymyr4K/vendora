apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendora-bff
  namespace: vendora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vendora-bff
  template:
    metadata:
      labels:
        app: vendora-bff
    spec:
      containers:
        - name: bff
          image: vendora/bff:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: CACHE_MODE
              value: "redis"
            - name: REDIS_URL
              value: "redis://vendora-redis:6379"
            - name: UPSTREAM_MODE
              value: "mock"
            - name: METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
