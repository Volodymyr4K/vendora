apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vendora-ingress
  namespace: vendora
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: vendora.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendora-web
                port:
                  number: 80
